services:
  # ────────────────────────────────────────────────────────────────────────────
  # Gramoz DB (PostgreSQL) — for all application data and vector search
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:alpine3.22
    restart: unless-stopped

    environment:
      # Superuser (used by Postgres itself + init script)
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Forwarded to init script for DB/user provisioning
      PLATFORM_DB_NAME: ${PLATFORM_DB_NAME}
      PLATFORM_DB_USER: ${PLATFORM_DB_USER}
      PLATFORM_DB_PASSWORD: ${PLATFORM_DB_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PLATFORM_DB_USER} -d ${PLATFORM_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    networks:
      - gramoz-net

  # ────────────────────────────────────────────────────────────────────────────
  # Redis — for application cache
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped

    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

    ports:
      - "6380:6379"

    volumes:
      - redis-data:/data

    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - gramoz-net

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  gramoz-net:
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
# Persistent Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
